<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1500" viewBox="0 0 1200 1500">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#374151"/>
    </marker>
    <style>
      .title { font: 700 30px Arial, sans-serif; fill: #172033; }
      .text { font: 600 24px Arial, sans-serif; fill: #172033; text-anchor: middle; }
      .small { font: 600 19px Arial, sans-serif; text-anchor: middle; }
      .arrow { stroke: #374151; stroke-width: 4; fill: none; marker-end: url(#arrow); }
      .process { stroke: #1f6f5f; stroke-width: 4; rx: 20; }
      .decision { stroke: #d97706; stroke-width: 4; }
    </style>
  </defs>

  <rect width="1200" height="1500" fill="#ffffff"/>
  <text x="600" y="55" class="title" text-anchor="middle">Veri Toplama ve Kademeli Fallback Akışı</text>

  <rect x="390" y="90" width="420" height="80" fill="#e8f5f1" class="process"/>
  <text x="600" y="140" class="text">Kullanıcı mahalleyi seçer</text>

  <line x1="600" y1="170" x2="600" y2="225" class="arrow"/>
  <polygon points="600,230 800,315 600,400 400,315" fill="#fff7e8" class="decision"/>
  <text x="600" y="307" class="text">OSM mahalle sınırı</text>
  <text x="600" y="338" class="text">bulundu mu?</text>

  <line x1="800" y1="315" x2="920" y2="315" class="arrow"/>
  <text x="850" y="295" class="small" fill="#13795b">Evet</text>
  <rect x="925" y="265" width="245" height="100" fill="#e8f5f1" class="process"/>
  <text x="1047" y="307" class="text">Sınır içinden</text>
  <text x="1047" y="338" class="text">veri çek</text>
  <text x="1047" y="390" class="small" fill="#13795b">Yüksek güven</text>

  <line x1="600" y1="400" x2="600" y2="460" class="arrow"/>
  <text x="640" y="435" class="small" fill="#b45309">Hayır</text>
  <rect x="365" y="465" width="470" height="100" fill="#fff7e8" class="process"/>
  <text x="600" y="507" class="text">Nominatim ile alan veya</text>
  <text x="600" y="538" class="text">merkez noktası tespit et</text>

  <line x1="600" y1="565" x2="600" y2="625" class="arrow"/>
  <rect x="365" y="630" width="470" height="90" fill="#fff7e8" class="process"/>
  <text x="600" y="685" class="text">Mahalle merkezi yarıçap sorgusu</text>
  <text x="675" y="755" class="small" fill="#b45309">Orta güven</text>

  <line x1="600" y1="720" x2="600" y2="785" class="arrow"/>
  <polygon points="600,790 780,865 600,940 420,865" fill="#fff7e8" class="decision"/>
  <text x="600" y="857" class="text">Yeterli tesis verisi</text>
  <text x="600" y="888" class="text">bulundu mu?</text>

  <line x1="780" y1="865" x2="920" y2="865" class="arrow"/>
  <text x="850" y="845" class="small" fill="#13795b">Evet</text>
  <rect x="925" y="820" width="245" height="90" fill="#e8f5f1" class="process"/>
  <text x="1047" y="858" class="text">Skorları hesapla</text>
  <text x="1047" y="889" class="text">ve sonucu döndür</text>

  <line x1="600" y1="940" x2="600" y2="995" class="arrow"/>
  <text x="640" y="975" class="small" fill="#b45309">Hayır</text>
  <rect x="365" y="1000" width="470" height="85" fill="#fff0e6" class="process"/>
  <text x="600" y="1052" class="text">Geniş yarıçap sorgusu</text>

  <line x1="600" y1="1085" x2="600" y2="1135" class="arrow"/>
  <rect x="365" y="1140" width="470" height="85" fill="#fdecec" class="process"/>
  <text x="600" y="1192" class="text">İlçe merkezi fallback</text>

  <line x1="600" y1="1225" x2="600" y2="1275" class="arrow"/>
  <rect x="365" y="1280" width="470" height="85" fill="#fdecec" class="process"/>
  <text x="600" y="1332" class="text">Şehir merkezi fallback</text>
  <text x="680" y="1398" class="small" fill="#b42318">Düşük güven</text>

  <line x1="365" y1="1322" x2="220" y2="1322" class="arrow"/>
  <rect x="30" y="1275" width="185" height="95" fill="#e8f5f1" class="process"/>
  <text x="122" y="1315" class="small" fill="#172033">Veri bulunursa</text>
  <text x="122" y="1343" class="small" fill="#172033">sonucu döndür</text>

  <line x1="600" y1="1365" x2="600" y2="1410" class="arrow"/>
  <rect x="365" y="1415" width="470" height="65" fill="#fbe3e3" stroke="#b42318" stroke-width="4" rx="20"/>
  <text x="600" y="1457" class="text">Veri yetersiz sonucu döndür</text>
</svg>
