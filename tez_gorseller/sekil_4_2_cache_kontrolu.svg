<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="850" viewBox="0 0 1400 850">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#374151"/>
    </marker>
    <style>
      .title { font: 700 34px Arial, sans-serif; fill: #172033; text-anchor: middle; }
      .code { font: 600 23px Consolas, monospace; fill: #172033; text-anchor: middle; }
      .text { font: 700 24px Arial, sans-serif; fill: #172033; text-anchor: middle; }
      .sub { font: 20px Arial, sans-serif; fill: #4b5563; text-anchor: middle; }
      .label { font: 700 21px Arial, sans-serif; text-anchor: middle; }
      .arrow { stroke: #374151; stroke-width: 4; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect width="1400" height="850" fill="#ffffff"/>
  <text x="700" y="55" class="title">Hatalı Sıfır-Cache Kontrol Akışı</text>

  <rect x="310" y="95" width="780" height="75" fill="#eef3ff" stroke="#4565a8" stroke-width="4" rx="18"/>
  <text x="700" y="142" class="code">cached_count = get_total_kategori_count(mahalle_id)</text>

  <line x1="700" y1="170" x2="700" y2="230" class="arrow"/>
  <polygon points="700,235 920,340 700,445 480,340" fill="#fff7e8" stroke="#d97706" stroke-width="4"/>
  <text x="700" y="330" class="text">cached_count &gt; 0</text>
  <text x="700" y="365" class="text">ve refresh kapalı mı?</text>

  <path d="M480 340 H270 V510" class="arrow"/>
  <text x="365" y="315" class="label" fill="#13795b">Evet</text>
  <rect x="70" y="515" width="400" height="135" fill="#e8f5f1" stroke="#1f6f5f" stroke-width="4" rx="20"/>
  <text x="270" y="570" class="text">Cache geçerli kabul edilir</text>
  <text x="270" y="612" class="sub">Skorlar veritabanından döndürülür</text>

  <path d="M920 340 H1130 V510" class="arrow"/>
  <text x="1035" y="315" class="label" fill="#b42318">Hayır</text>
  <rect x="930" y="515" width="400" height="135" fill="#fdecec" stroke="#b42318" stroke-width="4" rx="20"/>
  <text x="1130" y="570" class="text">Boş cache kullanılmaz</text>
  <text x="1130" y="612" class="sub">Güncel OSM verisi yeniden sorgulanır</text>

  <rect x="360" y="710" width="680" height="85" fill="#f2f8f6" stroke="#1f6f5f" stroke-width="3" rx="18"/>
  <text x="700" y="748" class="sub">Böylece last_fetched değeri bulunsa bile sıfır tesis içeren kayıtlar</text>
  <text x="700" y="780" class="sub">başarılı sonuç gibi kullanıcıya sunulmaz.</text>
</svg>
