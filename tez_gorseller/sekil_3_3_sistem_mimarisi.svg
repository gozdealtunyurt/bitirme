<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="1000" viewBox="0 0 1500 1000">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#374151"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#1f6f5f"/>
    </marker>
    <style>
      .box { fill: #f2f8f6; stroke: #1f6f5f; stroke-width: 4; rx: 20; }
      .external { fill: #fff7e8; stroke: #d97706; stroke-width: 4; rx: 20; }
      .database { fill: #eef3ff; stroke: #4565a8; stroke-width: 4; rx: 20; }
      .main { font: 700 27px Arial, sans-serif; fill: #172033; text-anchor: middle; }
      .sub { font: 20px Arial, sans-serif; fill: #4b5563; text-anchor: middle; }
      .label { font: 600 19px Arial, sans-serif; fill: #374151; text-anchor: middle; }
      .arrow { stroke: #374151; stroke-width: 4; fill: none; marker-end: url(#arrow); }
      .double { stroke: #1f6f5f; stroke-width: 4; fill: none; marker-start: url(#arrowGreen); marker-end: url(#arrowGreen); }
    </style>
  </defs>
  <rect width="1500" height="1000" fill="#ffffff"/>

  <!-- User -->
  <rect x="560" y="55" width="380" height="95" class="box"/>
  <text x="750" y="112" class="main">Kullanıcı</text>

  <line x1="750" y1="150" x2="750" y2="215" class="double"/>
  <text x="875" y="192" class="label">seçim ve sonuçlar</text>

  <!-- Frontend -->
  <rect x="520" y="220" width="460" height="125" class="box"/>
  <text x="750" y="270" class="main">React + Vite Frontend</text>
  <text x="750" y="310" class="sub">LocationSelector • ScoreCard • Recharts</text>

  <!-- Local JSON -->
  <rect x="55" y="225" width="330" height="115" class="external"/>
  <text x="220" y="273" class="main">Yerel Konum JSON</text>
  <text x="220" y="310" class="sub">İl • ilçe • mahalle listeleri</text>
  <line x1="385" y1="282" x2="520" y2="282" class="arrow"/>
  <rect x="397" y="226" width="110" height="38" fill="#ffffff" stroke="#b8c8c3" stroke-width="2" rx="12"/>
  <text x="452" y="252" class="label">dropdown</text>

  <!-- REST -->
  <line x1="750" y1="345" x2="750" y2="430" class="double"/>
  <rect x="615" y="370" width="270" height="48" fill="#ffffff" stroke="#1f6f5f" stroke-width="3" rx="16"/>
  <text x="750" y="402" class="label">REST API / JSON</text>

  <!-- Backend -->
  <rect x="425" y="435" width="650" height="145" class="box"/>
  <text x="750" y="485" class="main">FastAPI Backend</text>
  <text x="750" y="525" class="sub">api.py • osm_service.py • scoring.py</text>
  <text x="750" y="556" class="sub">cache kontrolü • AHP skor hesaplama</text>

  <!-- Connections -->
  <path d="M600 610 V665 H260 V720" class="double"/>
  <rect x="330" y="606" width="220" height="40" fill="#ffffff" stroke="#b8c8c3" stroke-width="2" rx="12"/>
  <text x="440" y="633" class="label">veri okuma / yazma</text>

  <path d="M750 610 V720" class="double"/>
  <rect x="775" y="670" width="205" height="40" fill="#ffffff" stroke="#b8c8c3" stroke-width="2" rx="12"/>
  <text x="877" y="697" class="label">OSM tesis sorguları</text>

  <path d="M900 610 V665 H1240 V720" class="double"/>
  <rect x="1010" y="606" width="270" height="40" fill="#ffffff" stroke="#b8c8c3" stroke-width="2" rx="12"/>
  <text x="1145" y="633" class="label">adres, alan ve koordinat</text>

  <!-- Bottom services -->
  <rect x="55" y="725" width="410" height="155" class="database"/>
  <text x="260" y="782" class="main">TiDB Cloud</text>
  <text x="260" y="822" class="sub">MySQL uyumlu veritabanı</text>
  <text x="260" y="854" class="sub">tesisler • skorlar • cache</text>

  <rect x="545" y="725" width="410" height="155" class="external"/>
  <text x="750" y="782" class="main">Overpass API</text>
  <text x="750" y="822" class="sub">OpenStreetMap tesis ve</text>
  <text x="750" y="854" class="sub">mekânsal öğe verileri</text>

  <rect x="1035" y="725" width="410" height="155" class="external"/>
  <text x="1240" y="782" class="main">Nominatim</text>
  <text x="1240" y="822" class="sub">Konum arama, merkez noktası</text>
  <text x="1240" y="854" class="sub">ve idari alan tespiti</text>

  <text x="750" y="955" class="label">Frontend: Netlify • Backend: Render • Veritabanı: TiDB Cloud</text>
</svg>
