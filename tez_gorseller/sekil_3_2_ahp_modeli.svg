<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="1050" viewBox="0 0 1500 1050">
  <defs>
    <style>
      .title { font: 700 34px Arial, sans-serif; fill: #172033; text-anchor: middle; }
      .subtitle { font: 700 27px Arial, sans-serif; fill: #1f6f5f; }
      .head { font: 700 20px Arial, sans-serif; fill: #ffffff; text-anchor: middle; }
      .cell { font: 20px Arial, sans-serif; fill: #172033; text-anchor: middle; }
      .row { font: 700 20px Arial, sans-serif; fill: #172033; }
      .note { font: 600 21px Arial, sans-serif; fill: #374151; }
      .good { font: 700 22px Arial, sans-serif; fill: #13795b; }
      .grid { stroke: #b8c8c3; stroke-width: 2; }
    </style>
  </defs>
  <rect width="1500" height="1050" fill="#ffffff"/>
  <text x="750" y="52" class="title">AHP İkili Karşılaştırma Matrisleri ve Ağırlık Sonuçları</text>

  <text x="55" y="105" class="subtitle">A) Kategori ağırlıkları</text>
  <rect x="55" y="130" width="1390" height="56" fill="#1f6f5f" rx="8"/>
  <text x="175" y="166" class="head">Kategori</text>
  <text x="405" y="166" class="head">Sağlık</text>
  <text x="585" y="166" class="head">Eğitim</text>
  <text x="765" y="166" class="head">Yeşil Alan</text>
  <text x="945" y="166" class="head">Ulaşım</text>
  <text x="1125" y="166" class="head">Sosyal</text>
  <text x="1340" y="166" class="head">Ağırlık</text>

  <g class="grid">
    <rect x="55" y="186" width="1390" height="58" fill="#f2f8f6"/>
    <rect x="55" y="244" width="1390" height="58" fill="#ffffff"/>
    <rect x="55" y="302" width="1390" height="58" fill="#f2f8f6"/>
    <rect x="55" y="360" width="1390" height="58" fill="#ffffff"/>
    <rect x="55" y="418" width="1390" height="58" fill="#f2f8f6"/>
  </g>

  <g class="row">
    <text x="80" y="223">Sağlık</text><text x="80" y="281">Eğitim</text>
    <text x="80" y="339">Yeşil Alan</text><text x="80" y="397">Ulaşım</text>
    <text x="80" y="455">Sosyal İmkânlar</text>
  </g>
  <g class="cell">
    <text x="405" y="223">1,000</text><text x="585" y="223">1,200</text><text x="765" y="223">2,000</text><text x="945" y="223">1,500</text><text x="1125" y="223">3,000</text><text x="1340" y="223">0,300</text>
    <text x="405" y="281">0,833</text><text x="585" y="281">1,000</text><text x="765" y="281">1,667</text><text x="945" y="281">1,250</text><text x="1125" y="281">2,500</text><text x="1340" y="281">0,250</text>
    <text x="405" y="339">0,500</text><text x="585" y="339">0,600</text><text x="765" y="339">1,000</text><text x="945" y="339">0,750</text><text x="1125" y="339">1,500</text><text x="1340" y="339">0,150</text>
    <text x="405" y="397">0,667</text><text x="585" y="397">0,800</text><text x="765" y="397">1,333</text><text x="945" y="397">1,000</text><text x="1125" y="397">2,000</text><text x="1340" y="397">0,200</text>
    <text x="405" y="455">0,333</text><text x="585" y="455">0,400</text><text x="765" y="455">0,667</text><text x="945" y="455">0,500</text><text x="1125" y="455">1,000</text><text x="1340" y="455">0,100</text>
  </g>
  <text x="55" y="515" class="note">Tutarlılık oranı:</text>
  <text x="265" y="515" class="good">CR ≈ 0,0000 &lt; 0,10 — tutarlı</text>

  <text x="55" y="585" class="subtitle">B) Alt ölçüt ağırlıkları</text>
  <rect x="55" y="610" width="970" height="56" fill="#1f6f5f" rx="8"/>
  <text x="180" y="646" class="head">Alt ölçüt</text>
  <text x="435" y="646" class="head">Yakınlık</text>
  <text x="625" y="646" class="head">Çeşitlilik</text>
  <text x="815" y="646" class="head">Yoğunluk</text>
  <text x="940" y="646" class="head">Ağırlık</text>

  <g class="grid">
    <rect x="55" y="666" width="970" height="64" fill="#f2f8f6"/>
    <rect x="55" y="730" width="970" height="64" fill="#ffffff"/>
    <rect x="55" y="794" width="970" height="64" fill="#f2f8f6"/>
  </g>
  <g class="row">
    <text x="80" y="707">Yakınlık</text><text x="80" y="771">Çeşitlilik</text><text x="80" y="835">Yoğunluk</text>
  </g>
  <g class="cell">
    <text x="435" y="707">1,000</text><text x="625" y="707">2,000</text><text x="815" y="707">3,000</text><text x="940" y="707">0,540</text>
    <text x="435" y="771">0,500</text><text x="625" y="771">1,000</text><text x="815" y="771">2,000</text><text x="940" y="771">0,297</text>
    <text x="435" y="835">0,333</text><text x="625" y="835">0,500</text><text x="815" y="835">1,000</text><text x="940" y="835">0,163</text>
  </g>

  <rect x="1080" y="635" width="365" height="205" fill="#f2f8f6" stroke="#1f6f5f" stroke-width="3" rx="18"/>
  <text x="1262" y="685" class="subtitle" text-anchor="middle">Ağırlık özeti</text>
  <text x="1120" y="735" class="note">Yakınlık: %53,96</text>
  <text x="1120" y="780" class="note">Çeşitlilik: %29,70</text>
  <text x="1120" y="825" class="note">Yoğunluk: %16,34</text>

  <text x="55" y="910" class="note">Tutarlılık oranı:</text>
  <text x="265" y="910" class="good">CR = 0,0079 &lt; 0,10 — tutarlı</text>
  <text x="55" y="975" class="note">Ağırlıklar, ikili karşılaştırma matrislerinin geometrik ortalama yöntemiyle normalize edilmesiyle hesaplanmıştır.</text>
</svg>
